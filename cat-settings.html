<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'">
  <title>猫の設定</title>
  <link rel="stylesheet" href="cat-settings.css">
</head>
<body>
  <div id="panel">
    <header>
      <span>🐱 猫の設定</span>
      <button id="close-btn" title="閉じる">×</button>
    </header>

    <label class="row">
      <span>猫の種類</span>
      <select id="set-type"></select>
    </label>

    <label class="row">
      <span>名前</span>
      <input id="set-name" type="text" maxlength="12">
    </label>

    <label class="row">
      <span>サイズ</span>
      <select id="set-scale">
        <option value="0.75">小さめ</option>
        <option value="1">ふつう</option>
        <option value="1.3">大きめ</option>
      </select>
    </label>

    <label class="row check">
      <input id="set-follow" type="checkbox">
      <span>カーソルを追いかける</span>
    </label>

    <label class="row check">
      <input id="set-aot" type="checkbox">
      <span>常に最前面に表示</span>
    </label>

    <label class="row check">
      <input id="set-autostart" type="checkbox">
      <span>ログイン時に自動起動</span>
    </label>

    <label class="row check">
      <input id="set-notify" type="checkbox">
      <span>通知リアクションを有効化</span>
    </label>

    <div class="section-title">イベントテスト（連携の動作確認）</div>
    <div id="event-btns">
      <button data-ev="task-start">タスク開始</button>
      <button data-ev="task-done">タスク完了</button>
      <button data-ev="error">エラー発生</button>
      <button data-ev="message">メッセージ受信</button>
      <button data-ev="idle-long">長時間放置</button>
    </div>

    <div class="hint">変更は即座に保存され、すべての猫に反映されます</div>
  </div>

  <script src="cat-types.js"></script>
  <script src="cat-settings.js"></script>
</body>
</html>
