name: Build Windows

# タグを push した時に自動ビルド。既存リリースには手動実行（tag を指定）で追加できる。
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Windows ビルドを添付するリリースタグ'
        required: true
        default: 'v1.0.5'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build (esbuild)
        run: npm run build

      - name: Package Windows (nsis + portable)
        run: npx electron-builder --win --publish never

      - name: List artifacts
        shell: bash
        run: ls -lh dist/*.exe

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" dist/*.exe --clobber
