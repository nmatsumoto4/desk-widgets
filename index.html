<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THE RETRO CENTER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <select id="mode-select" title="ゲームを選択"></select>
      <div id="scores">
        <div class="score-box">
          <span class="score-label">SCORE</span>
          <span id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">BEST</span>
          <span id="best">0</span>
        </div>
      </div>
      <div id="header-btns">
        <button id="mute-btn" title="効果音 ON/OFF">🔊</button>
        <button id="add-btn" title="ウィジェット追加">＋</button>
        <button id="hide-btn" title="すべて隠す（再表示はショートカット ⌘/Ctrl+Shift+H）">—</button>
        <button id="close-btn" title="終了">×</button>
      </div>
    </header>

    <div id="stage">
      <div id="board"></div>
      <div id="puyo"><canvas id="puyo-canvas"></canvas></div>
      <div id="rush"><canvas id="rush-canvas"></canvas></div>
      <div id="invaders"><canvas id="invaders-canvas"></canvas></div>
      <div id="bomber"><canvas id="bomber-canvas"></canvas></div>
      <div id="tetris"><canvas id="tetris-canvas"></canvas></div>
      <div id="snake"><canvas id="snake-canvas"></canvas></div>
      <div id="life"><canvas id="life-canvas"></canvas></div>
      <div id="breakout"><canvas id="breakout-canvas"></canvas></div>
      <div id="td"><canvas id="td-canvas"></canvas></div>
      <div id="hero"><canvas id="hero-canvas"></canvas></div>
      <div id="pac"><canvas id="pac-canvas"></canvas></div>
      <div id="tron"><canvas id="tron-canvas"></canvas></div>
      <div id="overlay">
        <span id="overlay-title"></span>
        <span id="overlay-sub"></span>
      </div>
    </div>

    <footer id="footer">
      <span id="mode-indicator">AI 自動運転中</span>
      <span id="puyo-ctrl">
        <button id="puyo-replay" title="最大連鎖をリプレイ">▶ﾘﾌﾟﾚｲ</button>
      </span>
      <span id="rush-ctrl">
        <button id="rush-minus" title="車を減らす">−</button>
        <span id="rush-cars-label"></span>
        <button id="rush-plus" title="車を増やす">＋</button>
      </span>
      <span id="bomber-ctrl">
        <button id="bomber-minus" title="ブロックを減らす">−</button>
        <span id="bomber-dens-label"></span>
        <button id="bomber-plus" title="ブロックを増やす">＋</button>
      </span>
      <span id="life-ctrl">
        <select id="life-preset" title="プリセットを選択"></select>
        <button id="life-random" title="ランダムを追加">＋ﾗﾝﾀﾞﾑ</button>
      </span>
      <span id="breakout-ctrl">
        <button id="breakout-minus" title="開始レベルを下げる">−</button>
        <span id="breakout-lv-label"></span>
        <button id="breakout-plus" title="開始レベルを上げる">＋</button>
      </span>
      <span id="games-count"></span>
    </footer>
  </div>

  <script src="sound.js"></script>
  <script src="game.js"></script>
  <script src="ai.js"></script>
  <script src="mod2048.js"></script>
  <script src="puyo.js"></script>
  <script src="puyo-ai.js"></script>
  <script src="mod-puyo.js"></script>
  <script src="rush.js"></script>
  <script src="mod-rush.js"></script>
  <script src="mod-invaders.js"></script>
  <script src="mod-bomber.js"></script>
  <script src="mod-tetris.js"></script>
  <script src="mod-snake.js"></script>
  <script src="mod-life.js"></script>
  <script src="mod-breakout.js"></script>
  <script src="mod-td.js"></script>
  <script src="mod-hero.js"></script>
  <script src="mod-pac.js"></script>
  <script src="mod-tron.js"></script>
  <script src="app.js"></script>
</body>
</html>
